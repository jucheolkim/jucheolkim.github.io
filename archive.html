<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 밑줄 · 전체 보기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #f0efeb; }
body { font-family: Georgia, serif; max-width: 680px; margin: 0 auto; padding: 40px 20px; color: #1a1a1a; background: #fff; word-break: keep-all; box-shadow: 0 0 40px rgba(0,0,0,0.06); }
.header { text-align: center; border-top: 3px solid #1a1a1a; border-bottom: 3px solid #1a1a1a; padding: 12px 0; margin-bottom: 4px; }
.header-sub { font-size: 11px; font-family: Arial, sans-serif; color: #888; letter-spacing: 2px; margin-bottom: 6px; }
.header-title { font-size: 36px; font-weight: 800; letter-spacing: 0px; font-family: 'Nanum Myeongjo', Georgia, serif; white-space: nowrap; }
.header-date { font-size: 11px; font-family: Arial, sans-serif; color: #888; margin-top: 6px; }
.meta { display: flex; justify-content: space-between; border-bottom: 1px solid #e0e0e0; padding: 4px 0; margin-bottom: 28px; font-size: 10px; font-family: Arial, sans-serif; color: #888; }
.archive-item { display: flex; align-items: baseline; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #e0e0e0; text-decoration: none; color: inherit; }
.archive-item:hover .archive-title { text-decoration: underline; }
.archive-meta { font-size: 10px; font-family: Arial, sans-serif; color: #aaa; white-space: nowrap; margin-left: 16px; }
.archive-left { flex: 1; }
.archive-vol { font-size: 10px; font-family: Arial, sans-serif; color: #888; letter-spacing: 1px; margin-bottom: 4px; }
.archive-title { font-size: 15px; font-family: 'Nanum Myeongjo', Georgia, serif; font-weight: bold; line-height: 1.4; }
.archive-tags { font-size: 10px; font-family: Arial, sans-serif; color: #aaa; margin-top: 4px; }
.footer { border-top: 1px solid #e0e0e0; padding-top: 8px; text-align: center; font-size: 10px; font-family: Arial, sans-serif; color: #aaa; margin-top: 28px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">ONEDAY DIGEST</div>
  <div class="header-title">오늘의 밑줄</div>
  <div class="header-date">전체 호 보기</div>
</div>
<div class="meta">
  <span>창업 · 브랜드 · AI·테크</span>
  <span>출처 표기 기반 요약 콘텐츠</span>
</div>

<div id="archive-list"></div>

<div class="footer">오늘의 밑줄 · 매일 발행 · 출처 표기 기반 요약 콘텐츠</div>

<script>
// ============================================================
// 새 호 발행 시 이 배열 맨 앞에 한 줄만 추가하면 됩니다.
// ============================================================
var VOLS = [
  { vol: 7, date: "2026년 3월 25일", title: "챗GPT가 모든 것을 삼키는 시대, 스타트업에게 남은 틈은 어디인가", tags: "리콴유 · 올리비아 무어 · AI 테크 브리핑" },
  { vol: 6, date: "2026년 3월 24일", title: "탁상공론이 전쟁터에서 무너지는 이유", tags: "알렉스 카프 · 렘 코닝 · AI 테크 브리핑" },
  { vol: 5, date: "2026년 3월 23일", title: "AGI를 가장 오래 기다려온 사람이 내린 단 하나의 정의", tags: "데미스 허사비스 · 매트 그레이 · AI 논문 브리핑" },
  { vol: 4, date: "2026년 3월 20일", title: "하루를 3개의 법칙으로 쪼갠 남자", tags: "Cal Newport · 정지헌 · AI 테크 브리핑" },
  { vol: 3, date: "2026년 3월 19일", title: "50년 동안 살아남은 회사는 무엇이 달랐나", tags: "팀 쿡 · 제레미 어틀리 · AI 테크 브리핑" },
  { vol: 2, date: "2026년 3월 18일", title: "쓰나미가 보이는데 사람들은 빛의 굴절이라 한다", tags: "다리오 아모데이 · Max Brodeur-Urbas · AI 테크 브리핑" },
  { vol: 1, date: "2026년 3월 18일", title: "매 시간을 기록한 남자가 40억 달러 회사를 만든 법", tags: "Mario Schlosser · 곽형석 · AI 테크 브리핑" },
];

var list = document.getElementById('archive-list');
var latestVol = VOLS[0].vol;

VOLS.forEach(function(v) {
  var a = document.createElement('a');
  a.href = 'vol' + v.vol + '.html';
  a.className = 'archive-item';
  a.innerHTML =
    '<div class="archive-left">' +
      '<div class="archive-vol">Vol. ' + v.vol + ' \u00b7 ' + v.date + '</div>' +
      '<div class="archive-title">' + v.title + '</div>' +
      '<div class="archive-tags">' + v.tags + '</div>' +
    '</div>' +
    '<div class="archive-meta">' + (v.vol === latestVol ? '\ucd5c\uc2e0\ud638' : '\u2192') + '</div>';
  list.appendChild(a);
});
</script>

</body>
</html>
